name: Python CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]


jobs:
  build-and-test:
    
    runs-on: ubuntu-latest

    steps:

      - name: Check out repository code
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run tests with pytest
        run: |
          pytest

  build-and-push-images:

      needs: build-and-test

      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      
      runs-on: ubuntu-latest
      
      steps:
        - name: Check out repository code
          uses: actions/checkout@v4

        - name: Set up QEMU
          uses: docker/setup-qemu-action@v3.7.0

        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v3.11.1

        - name: Log in to Docker Hub
          uses: docker/login-action@v3.6.0
          with:
            username: ${{ secrets.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}

        - name: Build and push sensor_emulator
          uses: docker/build-push-action@v6.18.0
          with:
            context: .
            dockerfile: sensor_emulator/Dockerfile
            push: true
            tags: ${{ secrets.DOCKERHUB_USERNAME }}/sensor-emulator:latest

        - name: Build and push data_collector
          uses: docker/build-push-action@v6.18.0
          with:
            context: .
            dockerfile: data_collector/Dockerfile
            push: true
            tags: ${{ secrets.DOCKERHUB_USERNAME }}/data-collector:latest

        - name: Build and push dashboard
          uses: docker/build-push-action@v6.18.0
          with:
            context: .
            dockerfile: dashboard/Dockerfile
            push: true
            tags: ${{ secrets.DOCKERHUB_USERNAME }}/dashboard:latest